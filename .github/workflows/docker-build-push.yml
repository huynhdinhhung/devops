name: Build Docker Image and Update K8s

on:
  push:
    branches:
      - main
    paths-ignore:
      - "k8s/**"

permissions:
  contents: write

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/gymmanage-app:${IMAGE_TAG} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/gymmanage-app:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/gymmanage-app:${IMAGE_TAG}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/gymmanage-app:latest

      - name: Update Kubernetes manifest image
        run: |
          sed -i "s|image: .*gymmanage-app:.*|image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/gymmanage-app:${IMAGE_TAG}|g" k8s/gymmanage-deployment.yml
          sed -i "s|imagePullPolicy: Never|imagePullPolicy: Always|g" k8s/gymmanage-deployment.yml

      - name: Commit updated Kubernetes manifest
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git diff --quiet; then
            echo "No manifest changes"
          else
            git add k8s/gymmanage-deployment.yml
            git commit -m "k8s: update gymmanage image to ${IMAGE_TAG}"
            git push
          fi
