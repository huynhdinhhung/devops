name: Deploy to VPS

on:
  workflow_run:
    workflows:
      - Node.js CI
    types:
      - completed
name: Deploy to VPS

on:
  workflow_run:
    workflows:
      - Node.js CI
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Deploy Docker app to VPS
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Docker on VPS
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e

            echo "Go to project"
            cd /var/www/gymmanage

            echo "Pull latest code"
            git pull origin main

            echo "Build Docker image"
            docker build -t gymmanage-app:latest .

            echo "Remove old container"
            docker rm -f gymmanage-docker || true

            echo "Run new container"
            docker run -d \
              --name gymmanage-docker \
              --restart unless-stopped \
              --network host \
              --env-file .env.docker \
              -e PORT=3001 \
              -e MONGODB_URI=mongodb://127.0.0.1:27017/GymManage \
              gymmanage-app:latest

            echo "Check container"
            docker ps

            echo "Deploy Docker done"
          EOF    branches:
      - main

jobs:
  deploy:
    name: Deploy app to VPS
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            cd /var/www/gymmanage
            git pull origin main
            npm install
            pm2 restart gymmanage --update-env || pm2 start server.js --name gymmanage
            pm2 save
          EOF
