apiVersion: apps/v1
kind: Deployment
metadata:
  name: gymmanage
  namespace: gymmanage
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gymmanage
  template:
    metadata:
      labels:
        app: gymmanage
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: gymmanage
          image: docker.io/hung16/gymmanage-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3003
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: gymmanage-config
            - secretRef:
                name: gymmanage-secret
